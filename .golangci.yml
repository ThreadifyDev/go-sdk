version: "2"
run:
  timeout: 10m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - revive
    - goconst
    - gocritic
    - misspell
    - gosec
    - bodyclose
    - noctx
    - prealloc
    - gocyclo
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
        - name: var-naming
          severity: warning
          arguments:
            - ["ID"]
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - wrapperFunc
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - goconst
          - gocritic
      - linters:
          - revive
        text: "should have comment or be unexported"
      - linters:
          - revive
        text: "should have a package comment"